spring.application.name=trustfundr-be-test

# In CI we don't have .env, so tests must be self-contained.
spring.datasource.url=jdbc:h2:mem:trustfundr_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Required app placeholders used by config (@Value / property binding)
allowed.origin=http://localhost:5173

springdoc.api-docs.path=/v1/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
openapi.dev-url=http://localhost
openapi.staging-url=http://localhost
openapi.prod-url=http://localhost

# HS256 needs >= 32 bytes
security.jwt.secret=0123456789abcdef0123456789abcdef
security.jwt.expiration-seconds=86400
