# APPLICATION CONFIGURATION
spring.application.name=trustfundr-be
# Comma-separated browser origins allowed to call the API (CORS). Next.js default is :3000; Vite is often :5173.
allowed.origin=${ALLOWED_ORIGIN:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000}

# Tomcat rejects requests when Cookie / other headers exceed ~8KB (common on localhost dev)
server.max-http-request-header-size=32KB

# DATABASE CONFIGURATION
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=${DB_UPDATE}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dynamic-update=true
# Set JPA_SHOW_SQL=true (and optionally JPA_FORMAT_SQL=true) in .env for local debugging
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.datasource.hikari.data-source-properties.cachePrepStmts=false
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048

# SWAGGER / API DOCUMENTATION CONFIGURATION
springdoc.api-docs.path=${API_DOCS}
springdoc.swagger-ui.path=${API_DOCS_HTML}
openapi.dev-url=${DEV_URL}
openapi.staging-url=${STG_URL}
openapi.prod-url=${PROD_URL}

# SECURITY / JWT CONFIGURATION
# HS256 needs a secret of at least 32 bytes (256 bits)
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
