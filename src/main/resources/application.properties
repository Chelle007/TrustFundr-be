# APPLICATION CONFIGURATION
spring.application.name=trustfundr-be
allowed.origin=${ALLOWED_ORIGIN:http://localhost:5173}

# Tomcat rejects requests when Cookie / other headers exceed ~8KB (common on localhost dev)
server.max-http-request-header-size=32KB

# DATABASE CONFIGURATION
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=${DB_UPDATE}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dynamic-update=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.datasource.hikari.data-source-properties.cachePrepStmts=false
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048

# ADMIN (HTTP Basic) — override via env for non-local use
app.security.admin.username=${ADMIN_USERNAME:admin}
app.security.admin.password=${ADMIN_PASSWORD:changeme}

# SWAGGER / API DOCUMENTATION CONFIGURATION
springdoc.api-docs.path=${API_DOCS}
springdoc.swagger-ui.path=${API_DOCS_HTML}
openapi.dev-url=${DEV_URL}
openapi.staging-url=${STG_URL}
openapi.prod-url=${PROD_URL}
